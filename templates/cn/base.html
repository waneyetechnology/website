    <!-- Geo-redirect: non-Chinese users → English version -->
    <script>
    (function() {
      // Don't redirect if user has explicitly chosen Chinese (clicked 中文 link)
      if (sessionStorage.getItem('lang_override') === 'cn') return;
      // Allow ?preview=cn URL param to bypass redirect for local testing
      if (location.search.indexOf('preview=cn') !== -1) {
        sessionStorage.setItem('lang_override', 'cn');
        return;
      }
      // Don't redirect from localhost / local file — for development preview
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:') return;

      var isChinese = false;
      var tz = '';
      try { tz = Intl.DateTimeFormat().resolvedOptions().timeZone || ''; } catch(e) {}
      var cnTZ = ['Asia/Shanghai','Asia/Chongqing','Asia/Harbin','Asia/Chungking','Asia/Urumqi','Asia/Kashgar','PRC','Asia/Taipei'];
      if (cnTZ.indexOf(tz) !== -1) isChinese = true;

      var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
      if (!isChinese && (lang === 'zh' || lang.indexOf('zh-cn') === 0 || lang.indexOf('zh-hans') === 0 || lang.indexOf('zh-sg') === 0 || lang.indexOf('zh-tw') === 0 || lang.indexOf('zh-hant') === 0 || lang.indexOf('zh-hk') === 0)) {
        isChinese = true;
      }

      if (!isChinese) {
        // Secondary: IP-based check — redirect to EN only if confirmed non-CN/TW
        // Two providers for GFW resilience (ipapi.co may be blocked in China)
        function checkIP(url, getCode) {
          return fetch(url, { cache: 'no-store' }).then(function(r){ return r.json(); }).then(getCode);
        }
        checkIP('https://ipapi.co/json/', function(d){ return d && d.country_code; })
          .catch(function(){ return checkIP('https://api.ip.sb/geoip', function(d){ return d && d.country_code; }); })
          .then(function(code){
            if (code && code !== 'CN' && code !== 'TW') {
              window.location.replace('../');
            }
          }).catch(function(){});
      }
    })();
    </script>
